<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Offline - WhatCanIStudy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background-color: #ffffff;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container {
      max-width: 600px;
      text-align: center;
      space: 2rem;
    }
    
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.5;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #111827;
    }
    
    p {
      font-size: 1rem;
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .offline-message {
      background-color: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 2rem;
      color: #78350f;
    }
    
    .saved-data {
      background-color: #dbeafe;
      border: 1px solid #bfdbfe;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 2rem;
      color: #1e40af;
      font-size: 0.9rem;
    }
    
    a {
      display: inline-block;
      background-color: #2563eb;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s;
      margin-top: 1rem;
    }
    
    a:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg
      class="icon"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"
      />
    </svg>
    
    <h1>You're Offline</h1>
    
    <p>
      WhatCanIStudy requires an internet connection to check program eligibility.
    </p>
    
    <div class="offline-message">
      <strong>No Internet Connection Detected</strong>
      <p style="margin-top: 0.5rem;">Please check your connection and try again.</p>
    </div>
    
    <div class="saved-data">
      <strong>Good News!</strong>
      <p style="margin-top: 0.5rem;">
        Your saved eligibility checks are stored locally and will be available when you're back online.
      </p>
    </div>
    
    <p>
      <a href="/" onclick="location.reload(); return false;">
        Try Again
      </a>
    </p>
  </div>
</body>
</html>
